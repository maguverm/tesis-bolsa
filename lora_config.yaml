model: "mlx-community/Mistral-7B-Instruct-v0.3-4bit"

train: true
fine_tune_type: lora
optimizer: adamw

data: "data/llm"
seed: 42

num_layers: 16
batch_size: 2
grad_accumulation_steps: 2  # batch efectivo = 4

iters: 2250
val_batches: -1
learning_rate: 1e-5

steps_per_report: 20
steps_per_eval: 150
save_every: 150

adapter_path: "adapters/mistral7b_bolsa_lora"
resume_adapter_file: null

test: false
max_seq_length: 1024
grad_checkpoint: true
mask_prompt: true

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.v_proj"]
  rank: 16
  scale: 20.0
  dropout: 0.05